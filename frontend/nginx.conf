server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        # 1. Tu URL pública (asegúrate de que termine en /)
        proxy_pass https://taller1-proyectointegradorii.onrender.com/;

        # 2. CONFIGURACIÓN CRÍTICA PARA RENDER
        proxy_ssl_server_name on; # Esto permite que Nginx hable por HTTPS correctamente
        proxy_set_header Host taller1-proyectointegradorii.onrender.com; # Forzamos el host del backend
        
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}