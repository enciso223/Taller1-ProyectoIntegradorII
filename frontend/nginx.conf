server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        # 1. Usa el nombre interno del servicio (aparece en Settings del Backend en Render)
        # Normalmente es el nombre del servicio + el puerto 10000
        proxy_pass http://taller1-proyectointegradorii:10000/; 

        proxy_http_version 1.1;
        
        # 2. IMPORTANTE: Cambia $host por $proxy_host
        proxy_set_header Host $proxy_host;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}