version: "3.9"

services:

  db:
    image: postgres:15
    container_name: expenses_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expenses
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always


  backend:
    build: ./backend
    container_name: expenses_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - backend/.env
    restart: always


  frontend:
    build: ./frontend
    container_name: expenses_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always


volumes:
  postgres_data: